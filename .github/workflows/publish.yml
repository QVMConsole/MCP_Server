name: Publish to npm

on:
  workflow_dispatch:  # 手动触发
    inputs:
      version:
        description: '版本号 (例如: 0.1.0, 0.2.0, 1.0.0)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # 需要写权限来创建标签
      id-token: write  # 用于 npm provenance
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史记录
      
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 验证版本号格式
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ 版本号格式错误: $VERSION"
            echo "正确格式: x.y.z (例如: 0.1.0)"
            exit 1
          fi
          echo "✅ 版本号格式正确: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        id: validate_version
      
      - name: 更新 package.json 版本
        run: |
          npm version ${{ steps.validate_version.outputs.version }} --no-git-tag-version --allow-same-version
          echo "✅ 已更新 package.json 版本为 ${{ steps.validate_version.outputs.version }}"
      
      - name: 提交版本更改
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.validate_version.outputs.version }}" || echo "没有变更需要提交"
          git push || echo "推送失败，继续执行"
      
      - name: 创建 Git 标签
        run: |
          git tag -a "v${{ steps.validate_version.outputs.version }}" -m "Release v${{ steps.validate_version.outputs.version }}"
          git push origin "v${{ steps.validate_version.outputs.version }}"
          echo "✅ 已创建标签 v${{ steps.validate_version.outputs.version }}"
      
      - name: 安装 npm 依赖
        run: npm install --ignore-scripts
      
      - name: 验证包内容
        run: |
          echo "📋 将要发布的文件:"
          npm pack --dry-run
      
      - name: 发布到 npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: 发布成功通知
        if: success()
        run: |
          echo "✅ 成功发布 @qvmconsole/mcp-server@${{ steps.validate_version.outputs.version }}"
          echo "📦 安装命令: npx @qvmconsole/mcp-server"
          echo "🏷️  Git 标签: v${{ steps.validate_version.outputs.version }}"
          echo "🔗 npm 链接: https://www.npmjs.com/package/@qvmconsole/mcp-server"
